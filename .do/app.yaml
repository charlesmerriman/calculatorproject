alerts:
- rule: DEPLOYMENT_FAILED
- rule: DOMAIN_FAILED
databases:
- engine: PG
  name: dev-db-462490
  version: "17"
# App-level env vars (shared by all components) — DigitalOcean Spaces image storage
envs:
- key: DO_SPACES_ACCESS_KEY
  scope: RUN_TIME
  value: allbuckets-1778774936035
- key: DO_SPACES_SECRET_KEY
  scope: RUN_TIME
  type: SECRET
  value: ""  # Set this in the DigitalOcean dashboard — never commit the real value
- key: DO_SPACES_BUCKET_NAME
  scope: RUN_TIME
  value: umacalculatorimages
- key: DO_SPACES_ENDPOINT_URL
  scope: RUN_TIME
  value: https://nyc3.digitaloceanspaces.com
- key: DO_SPACES_CDN_DOMAIN
  scope: RUN_TIME
  value: umacalculatorimages.nyc3.cdn.digitaloceanspaces.com
features:
- buildpack-stack=ubuntu-22
ingress:
  rules:
  - component:
      name: calculatorproject
    match:
      path:
        prefix: /api
  - component:
      name: calculatorcapstoneclient
    match:
      path:
        prefix: /
  - component:
      name: calculatorproject
      preserve_path_prefix: true
    match:
      path:
        prefix: /admin
  - component:
      name: calculatorproject
      preserve_path_prefix: true
    match:
      path:
        prefix: /static
name: umamusme-calculator
region: nyc
services:
- build_command: pip install -r requirements.txt && python manage.py collectstatic --noinput
  environment_slug: python
  envs:
  - key: DATABASE_URL
    scope: RUN_TIME
    value: ${dev-db-462490.DATABASE_URL}
  - key: DJANGO_SECRET_KEY
    scope: RUN_AND_BUILD_TIME
    type: SECRET
    value: ""  # Set this in the DigitalOcean dashboard — never commit the real value
  - key: DJANGO_ALLOWED_HOSTS
    scope: RUN_AND_BUILD_TIME
    value: umamusme-calculator-7zdcg.ondigitalocean.app
  github:
    branch: master
    deploy_on_push: true
    repo: charlesmerriman/calculatorproject
  http_port: 8080
  instance_count: 1
  instance_size_slug: apps-s-1vcpu-0.5gb
  name: calculatorproject
  run_command: python manage.py migrate && gunicorn calculatorproject.wsgi:application --bind 0.0.0.0:8080
  source_dir: /
static_sites:
- build_command: npm install && npm run build
  # SPA fallback: serve index.html for any path with no matching file,
  # so client-side routes (/app, /app/timeline) survive refresh/direct links
  catchall_document: index.html
  environment_slug: node-js
  envs:
  - key: VITE_API_URL
    scope: BUILD_TIME
    value: https://umamusme-calculator-7zdcg.ondigitalocean.app/api
  github:
    branch: master
    deploy_on_push: true
    repo: charlesmerriman/calculatorcapstoneclient
  name: calculatorcapstoneclient
  output_dir: dist
  source_dir: /
